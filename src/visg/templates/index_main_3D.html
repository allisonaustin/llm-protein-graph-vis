<script>
  // Initializing 3D object
  initGraph();

  function setStats(nlen, llen){
    let intr = (llen <= 1) ? "interaction" : "interactions";
    let prt = (nlen <= 1) ? "protein" : "proteins";
    document.getElementById("stats").innerHTML = `Showing ${nlen} ${prt} and ${llen} ${intr}`;
  }


  function getUniqueLinks(data){
    return data.reduce(function(a, b) {
      let s = typeof b.source === 'object' ? b.source.id : b.source;
      let t = typeof b.target === 'object' ? b.target.id : b.target;
      if(!(a.includes(s+"_"+t)))
      {
        a.push(s+"_"+t)
      }
      return a
    }, [])
  }

  document.documentElement.style.setProperty('--low-confidence', PRED_COLOR);
  document.documentElement.style.setProperty('--high-confidence', HIGH_CONF_COLOR);

  document.querySelectorAll('.card-header.collapsible').forEach(header => {
    const targetId = header.getAttribute('data-bs-target');
    const target = document.querySelector(targetId);
    const chevron = header.querySelector('.chevron-icon');

    header.addEventListener('click', () => {
      const isExpanded = target.classList.contains('show');
      target.classList.toggle('show');
      if (!isExpanded) {
        chevron.classList.remove('bi-chevron-right');
        chevron.classList.add('bi-chevron-down');
      } else {
        chevron.classList.remove('bi-chevron-down');
        chevron.classList.add('bi-chevron-right');
      }
    });
  });

  // pause or resume data partitions load from backend
  // const playPauseBtn = document.getElementById('play-pause-btn');
  // playPauseBtn.addEventListener('click', () => {
  //   pauseAnimation = !pauseAnimation;
  //   playPauseBtn.innerHTML = pauseAnimation ? '<i id="play-pause-icon" class="bi bi-play-circle-fill"></i>' : '<i id="play-pause-icon" class="bi bi-pause-circle-fill"></i>';
  //   console.log(pauseAnimation ? 'Pausing data load...' : 'Resuming data load...');
  // });

  // main graph load and backend data update listener
  // startDataLoad();
  document.getElementById("title").style.width = window.innerWidth.toString()+"px";
  document.getElementById("logo-images").style.paddingTop = (window.innerHeight-100).toString()+"px";
  document.getElementById("logo-images").style.paddingLeft = (window.innerWidth-460).toString()+"px";

  // graph resize on window resize
  d3.select(window).on("resize", () => {
    Graph.width(window.innerWidth);
    Graph.height(window.innerHeight);
    document.getElementById("logo-images").style.paddingTop = (window.innerHeight-100).toString()+"px";
    document.getElementById("logo-images").style.paddingLeft = (window.innerWidth-460).toString()+"px";
    document.getElementById("title").style.width = window.innerWidth.toString()+"px";
  });

  const helpIcons = document.querySelectorAll('.help-icon');

  helpIcons.forEach(icon => {
    const tooltip = icon.querySelector('.help-tooltip') || icon.nextElementSibling;
    icon.addEventListener('mouseenter', () => {
      tooltip.style.display = 'block';
      const rect = icon.getBoundingClientRect();

      let top = rect.bottom + 5;
      let left = rect.left + rect.width / 2 - tooltip.offsetWidth / 2;

      left = Math.max(5, Math.min(left, window.innerWidth - tooltip.offsetWidth - 5));
      top = Math.max(5, Math.min(top, window.innerHeight - tooltip.offsetHeight - 5));

      tooltip.style.top = `${top}px`;
      tooltip.style.left = `${left}px`;
    });

    icon.addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
    });
  });
</script>
